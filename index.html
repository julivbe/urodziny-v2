<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zadanie 5</title>
  </head>
  <body class="p-10 flex flex-col items-center font-sans">
    <h1 class="text-2xl font-bold text-primary mb-6">Oblicz dni do urodzin</h1>
    <form id="bday-form" class="flex flex-col gap-4 items-center">
      <label>Wybierz datę urodzenia:</label>
      <input type="date" id="bday-input" required class="border p-2 rounded" />
      <button type="submit" class="bg-blue-300 p-4 rounded text-white font-bold">Oblicz</button>
    </form>
    <dialog id="result-dialog" class="bg-gray-200 text-red-600 p-8 rounded-lg relative">
      <button id="close-dialog" class="absolute top-2 right-3 font-bold">x</button>
      <div id="dialog-content"></div>
    </dialog>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
